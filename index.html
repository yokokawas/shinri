<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- 【修正3】スマホでの意図しないズームを完全に防止 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>直感選択テスト</title>
    <style>
        body { font-family: 'Segoe UI', Meiryo, sans-serif; text-align: center; margin-top: 50px; background-color: #f9f9f9; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        
        /* 【修正3】テキスト選択ハイライトを禁止し、アプリのような挙動にする */
        .btn { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; border: none; border-radius: 5px; color: white; background-color: #007bff; transition: 0.2s; user-select: none; touch-action: manipulation; }
        .btn:hover { background-color: #0056b3; }
        
        .button-container { display: flex; justify-content: center; gap: 10px; flex-wrap: nowrap; }
        .btn-large { font-size: 24px; padding: 20px 0; margin: 10px 0; background-color: #28a745; width: 45%; box-sizing: border-box; }
        .btn-large:hover { background-color: #218838; }
        
        #timer { font-size: 24px; font-weight: bold; color: #dc3545; margin-bottom: 20px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        select, input[type="text"] { width: 100%; padding: 10px; margin-top: 5px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .consent-text { font-size: 12px; color: #666; margin-top: 20px; text-align: left; line-height: 1.4; border-top: 1px solid #ddd; padding-top: 10px; }
        .warning-text { color: #dc3545; font-weight: bold; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 画面1：開始画面 -->
    <div id="step1">
        <h2>直感テスト</h2>
        <p>あなたは<strong>見知らぬ場所で道に迷っています</strong>。<br>次の画面で、目の前に分かれ道が現れます。<br><strong>3秒以内</strong>に、直感でどちらに進むか選択してください。</p>
        <p class="warning-text">※テスト中はブラウザの「戻る」や「更新」を押さないでください。</p>
        <button class="btn" onclick="startTest()">テストを開始する</button>
        <div class="consent-text">
            ※本調査は大学での研究論文の執筆目的で実施しており、データは完全匿名で処理されます。テストの開始をもって同意とみなします。
        </div>
    </div>

    <!-- 画面2：左右の選択 -->
    <div id="step2" class="hidden">
        <div id="timer">残り時間: 3.0秒</div>
        <h2>道に迷っています。目の前に分かれ道があります。<br>左右どちらに進みますか？</h2>
        <div class="button-container">
            <button class="btn btn-large" onclick="selectDirection(1)">左</button>
            <button class="btn btn-large" onclick="selectDirection(2)">右</button>
        </div>
    </div>

    <!-- 画面3：アンケート -->
    <div id="step3" class="hidden">
        <h2>追加アンケート</h2>
        <!-- 【修正2】ネイティブ検証を有効にするため formタグのonsubmitを利用 -->
        <form id="surveyForm" onsubmit="event.preventDefault(); submitData();">
            <div class="form-group">
                <label>1. あなたの利き手はどちらですか？</label>
                <select id="dominantHand" required>
                    <option value="">選択してください</option>
                    <option value="1">右</option>
                    <option value="2">左</option>
                    <option value="3">両利き</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>2. 漫画やアニメで『HUNTER×HUNTER』を読んだり見たりしたことがありますか？</label>
                <select id="readHxH" required onchange="updateKurapikaOptions()">
                    <option value="">選択してください</option>
                    <option value="1">はい</option>
                    <option value="0">いいえ</option>
                </select>
            </div>

            <div class="form-group hidden" id="kurapikaWrapper">
                <label>3. あなたはクラピカ理論を知っていましたか？<br>
                クラピカ理論とは、ハンター試験編でクラピカが語った「人は迷った時、無意識に左を選ぶ習性がある」という法則のことです。</label>
                <select id="knowsKurapika" required>
                </select>
            </div>

            <div class="form-group">
                <label>4. あなたの性別を教えてください</label>
                <select id="gender" required>
                    <option value="">選択してください</option>
                    <option value="1">男性</option>
                    <option value="2">女性</option>
                    <option value="3">その他・答えたくない</option>
                </select>
            </div>

            <div class="form-group">
                <label>5. あなたの学年（または現在の身分）を教えてください</label>
                <select id="age" required>
                    <option value="">選択してください</option>
                    <option value="1">大学1年生</option>
                    <option value="2">大学2年生</option>
                    <option value="3">大学3年生</option>
                    <option value="4">大学4年生</option>
                    <option value="5">大学院生</option>
                    <option value="6">短大・専門学生</option>
                    <option value="7">社会人・その他</option>
                </select>
            </div>

            <!-- 【修正2】type="submit"に変更し、ブラウザの必須チェック機能を作動させる -->
            <button type="submit" class="btn" id="submitBtn">回答を送信</button>
        </form>
    </div>

    <!-- 画面4：完了画面 -->
    <div id="step4" class="hidden">
        <h2>ご協力ありがとうございました！</h2>
        <p>回答が記録されました。ブラウザを閉じて終了してください。</p>
    </div>
</div>

<script>
    window.onload = function() {
        if (localStorage.getItem('hxh_survey_completed') || localStorage.getItem('hxh_survey_started')) {
            document.getElementById('step1').innerHTML = "<h2>アクセス済みです</h2><p>このテストは1回しか受けることができません。ご協力ありがとうございました！</p>";
        }
    };

    let timerInterval;
    let startTime;
    // 【修正1】連打防止用のフラグを追加
    let isAnswered = false; 

    let userResult = {
        direction: "", 
        timeout: 0,
        rt: 0 
    };

    function startTest() {
        localStorage.setItem('hxh_survey_started', 'true');
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');

        startTime = performance.now();
        
        timerInterval = setInterval(() => {
            // もし既に回答済みなら、以後のタイマー処理は無視する
            if (isAnswered) return;

            const elapsedSec = (performance.now() - startTime) / 1000;
            const currentTimeLeft = 3.0 - elapsedSec;
            
            document.getElementById('timer').innerText = `残り時間: ${Math.max(0, currentTimeLeft).toFixed(1)}秒`;
            
            if (currentTimeLeft <= 0) {
                isAnswered = true; // 【修正1】ロックをかける
                clearInterval(timerInterval);
                userResult.direction = 0; 
                userResult.timeout = 1;  
                userResult.rt = "3.000"; 
                alert("時間切れです！次の質問にお進みください。");
                moveToSurvey();
            }
        }, 50);
    }

    function selectDirection(dir) {
        // 【修正1】すでに回答済み（時間切れ、または二度押し）の場合は処理をブロック
        if (isAnswered) return;
        isAnswered = true; // 【修正1】ロックをかける

        clearInterval(timerInterval);

        const endTime = performance.now();
        const elapsedSec = (endTime - startTime) / 1000;

        // すり抜けチェック（念のため）
        if (elapsedSec > 3.0) {
            userResult.direction = 0; 
            userResult.timeout = 1;
            userResult.rt = "3.000";
            alert("時間切れです！次の質問にお進みください。");
        } else {
            userResult.direction = dir; 
            userResult.rt = elapsedSec.toFixed(3);
        }

        moveToSurvey();
    }

    function moveToSurvey() {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
    }

    function updateKurapikaOptions() {
        const hxh = document.getElementById('readHxH').value;
        const wrapper = document.getElementById('kurapikaWrapper');
        const kurapikaSelect = document.getElementById('knowsKurapika');

        if (hxh === "") {
            wrapper.classList.add('hidden');
            kurapikaSelect.innerHTML = "";
            return;
        }

        wrapper.classList.remove('hidden');
        kurapikaSelect.innerHTML = '<option value="">選択してください</option>';

        if (hxh === "1") {
            kurapikaSelect.innerHTML += `
                <option value="3">原作（アニメ）で見てはっきりと覚えており、普段の生活でも意識することがある</option>
                <option value="2">確かに原作（アニメ）で見た記憶があり、内容は知っていた</option>
                <option value="1">言われてみれば、そんなセリフがあったような気がする</option>
                <option value="0">作品に触れたことはあるが、その理論は全く覚えていない／知らなかった</option>
            `;
        } else if (hxh === "0") {
            kurapikaSelect.innerHTML += `
                <option value="3">ネットやSNS等でよく見ており、普段の生活でも意識することがある</option>
                <option value="2">ネットやSNS等で見たことがあり、内容は知っていた</option>
                <option value="1">言われてみれば、どこかで聞いたことがあるような気がする</option>
                <option value="0">全く聞いたことがない／知らなかった</option>
            `;
        }
    }

    function submitData() {
        // ※onsubmit経由で呼ばれるため、空欄チェック（必須チェック）は既にブラウザが完了しています
        const hand = document.getElementById('dominantHand').value;
        const hxh = document.getElementById('readHxH').value;
        const kurapika = document.getElementById('knowsKurapika').value;
        const gender = document.getElementById('gender').value; 
        const age = document.getElementById('age').value;       

        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ? 1 : 0;

        const finalData = {
            direction: userResult.direction,
            timeout: userResult.timeout,
            rt: userResult.rt,
            hand: hand,
            hxh: hxh,
            kurapika: kurapika,
            gender: gender,
            age: age,
            device: isMobile
        };

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "送信中...";

        const gasURL = "https://script.google.com/macros/s/AKfycbz1n0ZSDy1U_DOAde5YTV8pO_dffOI5rKUHCKMQ1MECb6NKiZ8Y6wW_g7dtnhkJxm0n/exec";

        fetch(gasURL, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(finalData)
        })
        .then(response => {
            localStorage.removeItem('hxh_survey_started');
            localStorage.setItem('hxh_survey_completed', 'true');
            
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step4').classList.remove('hidden');
        })
        .catch(error => {
            alert("送信に失敗しました。通信環境を確認してください。");
            btn.disabled = false;
            btn.innerText = "回答を送信";
            console.error(error);
        });
    }
</script>

</body>
</html>
